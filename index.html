<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Groq Chat</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0c0c0e; --bg2:#141417; --bg3:#1c1c21;
  --border:#2a2a32; --border2:#3a3a45;
  --accent:#00e5a0; --accent2:#00b880; --adim:rgba(0,229,160,.10);
  --text:#e8e8f0; --text2:#8888a0; --text3:#555566;
  --ubg:#1a2a22; --uborder:rgba(0,229,160,.18);
  --err:#ff5555; --f:'JetBrains Mono',monospace; --sw:252px;
}
*{box-sizing:border-box;margin:0;padding:0}
html{height:100%}
body{font-family:var(--f);background:var(--bg);color:var(--text);font-size:13px;display:flex;
  height:100vh;height:100dvh;overflow:hidden}

/* ── SIDEBAR ── */
#sb{width:var(--sw);background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;transition:transform .25s;z-index:100;min-height:0}
#sb-hd{padding:13px 10px 10px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px}
.logo{color:var(--accent);font-weight:700;font-size:15px;letter-spacing:-.5px;flex:1}
.logo span{color:var(--text3);font-weight:300}
#btn-new{background:var(--adim);border:1px solid rgba(0,229,160,.35);color:var(--accent);border-radius:6px;padding:5px 9px;font-family:var(--f);font-size:11px;cursor:pointer;white-space:nowrap;transition:all .15s}
#btn-new:hover{background:var(--accent);color:var(--bg)}
#cl{flex:1;overflow-y:auto;padding:6px 5px;display:flex;flex-direction:column;gap:2px}
.ci{padding:7px 9px;border-radius:6px;cursor:pointer;color:var(--text2);font-size:12px;display:flex;align-items:center;gap:6px;transition:all .12s;border:1px solid transparent}
.ci:hover{background:var(--bg3);color:var(--text)}
.ci.on{background:var(--adim);border-color:rgba(0,229,160,.2);color:var(--accent)}
.ct{flex:1;overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
.cd{opacity:0;color:var(--text3);font-size:15px;flex-shrink:0;transition:opacity .12s}
.ci:hover .cd{opacity:1}
.cd:hover{color:var(--err)!important}
#sb-ft{padding:8px;border-top:1px solid var(--border);color:var(--text3);font-size:10px;text-align:center;line-height:1.5}

/* ── MAIN ── */
#main{flex:1;display:flex;flex-direction:column;min-width:0;min-height:0;overflow:hidden}

/* ── TOPBAR ── */
#tb{display:flex;align-items:center;gap:7px;padding:9px 12px;border-bottom:1px solid var(--border);background:var(--bg2);flex-shrink:0;flex-wrap:wrap}
#btn-menu{display:none;background:none;border:1px solid var(--border);color:var(--text2);border-radius:6px;padding:5px 8px;font-size:16px;cursor:pointer;line-height:1}
#ms{background:var(--bg3);border:1px solid var(--border2);color:var(--text);border-radius:6px;padding:5px 8px;font-family:var(--f);font-size:12px;cursor:pointer;outline:none;flex-shrink:0;max-width:250px}
#ms:focus{border-color:rgba(0,229,160,.5)}
#ms optgroup{background:var(--bg3);color:var(--text2)}
#ms option{background:var(--bg3);color:var(--text)}
#tb-sp{flex:1}
/* API key wrap */
#ak{display:flex;align-items:center;gap:5px;background:var(--bg3);border:1px solid var(--border2);border-radius:6px;padding:4px 8px;transition:border-color .2s;flex-shrink:0}
#ak.ok{border-color:rgba(0,229,160,.45)}
#ak.bad{border-color:rgba(255,85,85,.45)}
.kl{color:var(--text3);font-size:11px;white-space:nowrap}
#ki{background:none;border:none;outline:none;color:var(--text);font-family:var(--f);font-size:12px;width:150px;min-width:40px}
#ki::placeholder{color:var(--text3)}
#kd{font-size:12px;flex-shrink:0}
#btn-paste{background:none;border:none;color:var(--text3);padding:0 2px;cursor:pointer;font-size:14px;line-height:1;transition:color .15s;flex-shrink:0}
#btn-paste:hover{color:var(--accent)}
#btn-cfg{background:none;border:1px solid var(--border);color:var(--text2);border-radius:6px;padding:5px 9px;font-size:15px;cursor:pointer;transition:all .15s;line-height:1;flex-shrink:0}
#btn-cfg:hover,#btn-cfg.on{border-color:var(--accent);color:var(--accent)}

/* ── SETTINGS ── */
#cfg{display:none;background:var(--bg2);border-bottom:1px solid var(--border);padding:12px 14px;gap:14px;flex-wrap:wrap;align-items:flex-start}
#cfg.on{display:flex}
.sg{display:flex;flex-direction:column;gap:5px;min-width:130px;flex:1}
.sl{font-size:11px;color:var(--text2);display:flex;justify-content:space-between}
.sl em{color:var(--accent);font-style:normal;font-weight:500}
input[type=range]{-webkit-appearance:none;width:100%;height:4px;border-radius:2px;background:var(--border2);outline:none;cursor:pointer}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;border-radius:50%;background:var(--accent);cursor:pointer}
.sg textarea{background:var(--bg3);border:1px solid var(--border2);color:var(--text);border-radius:6px;padding:7px 9px;font-family:var(--f);font-size:12px;resize:vertical;min-height:60px;outline:none;line-height:1.5;width:100%}
.sg textarea:focus{border-color:rgba(0,229,160,.5)}
.sg textarea::placeholder{color:var(--text3)}

/* ── CHAT ── */
#chat{flex:1;overflow-y:auto;padding:18px 14px;display:flex;flex-direction:column;gap:3px;scroll-behavior:smooth;background:var(--bg);min-height:0}
#emp{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;color:var(--text3);text-align:center;padding:40px}
.ei{font-size:38px;opacity:.3}
.et{font-size:15px;color:var(--text2);font-weight:500}
.es{font-size:11px;line-height:1.7}
.msg{display:flex;flex-direction:column;gap:2px;max-width:86%;animation:mi .15s ease}
@keyframes mi{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
.msg.user{align-self:flex-end;align-items:flex-end}
.msg.assistant{align-self:flex-start;align-items:flex-start}
.mr{font-size:10px;color:var(--text3);padding:0 3px;text-transform:uppercase;letter-spacing:.8px}
.bub{padding:9px 13px;border-radius:10px;line-height:1.65;word-break:break-word;white-space:pre-wrap;font-size:13px}
.msg.user .bub{background:var(--ubg);border:1px solid var(--uborder);border-bottom-right-radius:3px}
.msg.assistant .bub{background:var(--bg2);border:1px solid var(--border);border-bottom-left-radius:3px}
.bub code{background:var(--bg);border:1px solid var(--border2);border-radius:4px;padding:1px 5px;font-size:12px;color:var(--accent);font-family:var(--f)}
.bub pre{background:var(--bg);border:1px solid var(--border2);border-radius:6px;padding:10px 12px;overflow-x:auto;margin:6px 0}
.bub pre code{background:none;border:none;padding:0;color:var(--text)}
.thinking{color:var(--text3);font-style:italic;font-size:12px}
.dots span{animation:dot 1.2s infinite;opacity:0}
.dots span:nth-child(2){animation-delay:.2s}
.dots span:nth-child(3){animation-delay:.4s}
@keyframes dot{0%,80%,100%{opacity:0}40%{opacity:1}}

/* ── INPUT ── */
#ir{padding:10px 12px;border-top:1px solid var(--border);background:var(--bg2);display:flex;gap:7px;align-items:flex-end;flex-shrink:0}
#mi{flex:1;background:var(--bg3);border:1px solid var(--border2);color:var(--text);border-radius:8px;padding:8px 11px;font-family:var(--f);font-size:13px;resize:none;outline:none;line-height:1.5;max-height:150px;overflow-y:auto;min-height:38px;transition:border-color .15s}
#mi:focus{border-color:rgba(0,229,160,.6)}
#mi::placeholder{color:var(--text3)}
#bs{background:var(--accent);border:none;color:var(--bg);border-radius:8px;padding:8px 14px;font-family:var(--f);font-size:16px;font-weight:700;cursor:pointer;transition:all .15s;flex-shrink:0;min-width:42px;height:38px;display:flex;align-items:center;justify-content:center}
#bs:hover:not(:disabled){background:var(--accent2)}
#bs:disabled{opacity:.4;cursor:not-allowed}
#bs.stop{background:var(--err)}
#bc{background:none;border:1px solid var(--border);color:var(--text3);border-radius:8px;padding:8px 10px;cursor:pointer;font-size:14px;transition:all .15s;line-height:1;height:38px}
#bc:hover{border-color:rgba(255,85,85,.5);color:var(--err)}

/* ── SCROLLBAR ── */
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}

/* ── TOAST ── */
#toast{position:fixed;bottom:70px;left:50%;transform:translateX(-50%) translateY(12px);background:var(--bg3);border:1px solid var(--border2);color:var(--text);padding:8px 18px;border-radius:8px;font-size:12px;opacity:0;pointer-events:none;transition:all .25s;z-index:999;max-width:90vw;text-align:center;white-space:normal}
#toast.on{opacity:1;transform:translateX(-50%) translateY(0)}
#toast.err{border-color:rgba(255,85,85,.5);color:var(--err)}
#toast.ok{border-color:rgba(0,229,160,.4);color:var(--accent)}

/* ── OVERLAY ── */
#ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:99}

/* ── PASTE MODAL ── */
#pm{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:500;align-items:center;justify-content:center}
#pm.on{display:flex}
#pm-box{background:var(--bg2);border:1px solid var(--border2);border-radius:12px;padding:20px;width:min(380px,92vw);display:flex;flex-direction:column;gap:12px}
#pm-box .sl{font-size:13px;color:var(--text)}
#pm-hint{font-size:12px;color:var(--text2)}
#pm-hint em{color:var(--accent);font-style:normal}
#pm-in{background:var(--bg3);border:1px solid var(--border2);color:var(--text);border-radius:6px;padding:9px 11px;font-family:var(--f);font-size:12px;outline:none;width:100%}
#pm-in:focus{border-color:rgba(0,229,160,.5)}
#pm-btns{display:flex;gap:8px;justify-content:flex-end}
.pb{border-radius:6px;padding:8px 18px;font-family:var(--f);font-size:12px;cursor:pointer;border:1px solid var(--border2);background:none;color:var(--text2);transition:all .15s}
.pb:hover{color:var(--text);border-color:var(--text2)}
.pb.ok{background:var(--accent);border-color:var(--accent);color:var(--bg);font-weight:700}
.pb.ok:hover{background:var(--accent2)}

/* ── MOBILE ── */
@media(max-width:640px){
  #sb{position:fixed;top:0;left:0;bottom:0;transform:translateX(-100%)}
  #sb.on{transform:translateX(0)}
  #ov.on{display:block}
  #btn-menu{display:flex;align-items:center;justify-content:center}
  #ki{width:90px}
  .msg{max-width:95%}
  #cfg{gap:10px}
}
</style>
</head>
<body>

<div id="ov"></div>

<!-- SIDEBAR -->
<div id="sb">
  <div id="sb-hd">
    <div class="logo">GROQ<span>/chat</span></div>
    <button id="btn-new">+ Новый</button>
  </div>
  <div id="cl"></div>
  <div id="sb-ft">История в localStorage</div>
</div>

<!-- MAIN -->
<div id="main">
  <div id="tb">
    <button id="btn-menu">☰</button>

    <select id="ms">
      <optgroup label="★ FREE — бесплатные">
        <option value="llama-3.3-70b-versatile">Llama 3.3 70B Versatile</option>
        <option value="llama-3.1-8b-instant">Llama 3.1 8B Instant</option>
        <option value="llama3-70b-8192">Llama 3 70B (8k)</option>
        <option value="llama3-8b-8192">Llama 3 8B (8k)</option>
        <option value="mixtral-8x7b-32768">Mixtral 8×7B (32k)</option>
        <option value="gemma2-9b-it">Gemma 2 9B</option>
        <option value="gemma-7b-it">Gemma 7B</option>
      </optgroup>
      <optgroup label="── Другие">
        <option value="deepseek-r1-distill-llama-70b">DeepSeek R1 Llama 70B</option>
        <option value="qwen-qwq-32b">Qwen QwQ 32B</option>
        <option value="llama-3.2-90b-vision-preview">Llama 3.2 90B Vision</option>
        <option value="llama-3.2-11b-vision-preview">Llama 3.2 11B Vision</option>
        <option value="llama-3.1-70b-versatile">Llama 3.1 70B Versatile</option>
      </optgroup>
    </select>

    <div id="tb-sp"></div>

    <div id="ak">
      <span class="kl">API</span>
      <input id="ki" type="password" placeholder="gsk_…" autocomplete="off" spellcheck="false">
      <span id="kd">⬤</span>
      <button id="btn-paste" title="Вставить ключ">📋</button>
    </div>

    <button id="btn-cfg" title="Настройки">⚙</button>
    <button id="btn-test" title="Тест соединения" style="background:none;border:1px solid var(--border);color:var(--text2);border-radius:6px;padding:5px 8px;font-size:11px;cursor:pointer;font-family:var(--f);flex-shrink:0;transition:all .15s">тест</button>
  </div>

  <div id="cfg">
    <div class="sg" style="min-width:200px;flex:2">
      <div class="sl">Системный промт</div>
      <textarea id="sp" placeholder="Ты полезный ассистент…" rows="3"></textarea>
    </div>
    <div class="sg">
      <div class="sl">Temperature <em id="tv">0.70</em></div>
      <input type="range" id="tmp" min="0" max="2" step="0.05" value="0.7">
    </div>
    <div class="sg">
      <div class="sl">Max tokens <em id="tkv">2048</em></div>
      <input type="range" id="tok" min="128" max="8192" step="128" value="2048">
    </div>
  </div>

  <div id="chat">
    <div id="emp">
      <div class="ei">⚡</div>
      <div class="et">Groq Chat</div>
      <div class="es">Вставьте API ключ через 📋 и начните диалог.<br>История сохраняется в браузере.</div>
    </div>
  </div>

  <div id="ir">
    <textarea id="mi" placeholder="Сообщение… (Enter — отправить, Shift+Enter — перенос)" rows="1"></textarea>
    <button id="bc" title="Очистить чат">🗑</button>
    <button id="bs">▶</button>
  </div>
</div>

<div id="toast"></div>

<!-- PASTE MODAL -->
<div id="pm">
  <div id="pm-box">
    <div class="sl">Вставить API ключ</div>
    <div id="pm-hint">Нажми <em>Ctrl+V</em> (или долгое нажатие → Вставить) в поле ниже</div>
    <input id="pm-in" type="text" placeholder="gsk_…" autocomplete="off" spellcheck="false">
    <div id="pm-btns">
      <button class="pb" id="pm-cancel">Отмена</button>
      <button class="pb ok" id="pm-ok">Применить</button>
    </div>
  </div>
</div>

<script>
'use strict';
// Fix mobile viewport height (address bar issue)
function fixVH() {
  var vh = window.innerHeight * 0.01;
  document.documentElement.style.setProperty('--real-vh', vh + 'px');
  document.body.style.height = window.innerHeight + 'px';
}
fixVH();
window.addEventListener('resize', fixVH);


// ── STATE ──
var convs = [], curId = null, busy = false, xhr = null;

// ── ELEMENTS ──
var $sb      = document.getElementById('sb');
var $ov      = document.getElementById('ov');
var $cl      = document.getElementById('cl');
var $chat    = document.getElementById('chat');
var $emp     = document.getElementById('emp');
var $mi      = document.getElementById('mi');
var $bs      = document.getElementById('bs');
var $bc      = document.getElementById('bc');
var $ms      = document.getElementById('ms');
var $sp      = document.getElementById('sp');
var $tmp     = document.getElementById('tmp');
var $tok     = document.getElementById('tok');
var $tv      = document.getElementById('tv');
var $tkv     = document.getElementById('tkv');
var $ki      = document.getElementById('ki');
var $ak      = document.getElementById('ak');
var $kd      = document.getElementById('kd');
var $toast   = document.getElementById('toast');
var $pm      = document.getElementById('pm');
var $pmIn    = document.getElementById('pm-in');
var $cfg     = document.getElementById('cfg');
var $btnCfg  = document.getElementById('btn-cfg');
var $btnNew  = document.getElementById('btn-new');
var $btnMenu = document.getElementById('btn-menu');
var $btnPaste= document.getElementById('btn-paste');
var $pmOk    = document.getElementById('pm-ok');
var $pmCancel= document.getElementById('pm-cancel');

// ── STORAGE ──
function save() {
  try {
    localStorage.setItem('gq_convs', JSON.stringify(convs));
    localStorage.setItem('gq_cur',   curId || '');
    localStorage.setItem('gq_model', $ms.value);
    localStorage.setItem('gq_sys',   $sp.value);
    localStorage.setItem('gq_tmp',   $tmp.value);
    localStorage.setItem('gq_tok',   $tok.value);
  } catch(e) {}
}

function load() {
  try {
    var raw = localStorage.getItem('gq_convs');
    if (raw) convs = JSON.parse(raw);
    var key = localStorage.getItem('gq_api_key');
    if (key) $ki.value = key;
    var m = localStorage.getItem('gq_model');
    if (m) $ms.value = m;
    var sys = localStorage.getItem('gq_sys');
    if (sys !== null) $sp.value = sys;
    var tmp = localStorage.getItem('gq_tmp');
    if (tmp !== null) { $tmp.value = tmp; $tv.textContent = parseFloat(tmp).toFixed(2); }
    var tok = localStorage.getItem('gq_tok');
    if (tok !== null) { $tok.value = tok; $tkv.textContent = tok; }
    var cur = localStorage.getItem('gq_cur');
    if (cur && convs.find(function(c){return c.id===cur;})) curId = cur;
    else if (convs.length) curId = convs[0].id;
  } catch(e) {}
}

function saveKey(v) {
  try { localStorage.setItem('gq_api_key', v); } catch(e) {}
}

// ── API KEY ──
function updKey() {
  var k = $ki.value.trim();
  if (!k) { $kd.style.color = 'var(--text3)'; $ak.className = ''; }
  else if (k.startsWith('gsk_') && k.length > 20) { $kd.style.color = 'var(--accent)'; $ak.className = 'ok'; }
  else { $kd.style.color = 'var(--err)'; $ak.className = 'bad'; }
}
$ki.addEventListener('input', function() { updKey(); saveKey($ki.value.trim()); });

// ── PASTE MODAL ──
$btnPaste.addEventListener('click', function() {
  $pmIn.value = '';
  $pm.classList.add('on');
  setTimeout(function(){ $pmIn.focus(); }, 100);
});
function closePm() { $pm.classList.remove('on'); }
function applyKey() {
  var v = $pmIn.value.trim();
  if (!v) { toast('Поле пустое', 'err'); return; }
  $ki.value = v;
  updKey();
  saveKey(v);
  closePm();
  toast('Ключ сохранён ✓', 'ok');
}
$pmOk.addEventListener('click', applyKey);
$pmCancel.addEventListener('click', closePm);
$pm.addEventListener('click', function(e){ if(e.target===$pm) closePm(); });
$pmIn.addEventListener('keydown', function(e){
  if (e.key==='Enter') applyKey();
  if (e.key==='Escape') closePm();
});

// ── SETTINGS ──
$btnCfg.addEventListener('click', function(){
  $cfg.classList.toggle('on');
  $btnCfg.classList.toggle('on');
});
$tmp.addEventListener('input', function(){ $tv.textContent = parseFloat($tmp.value).toFixed(2); save(); });
$tok.addEventListener('input', function(){ $tkv.textContent = $tok.value; save(); });
$ms.addEventListener('change', save);
$sp.addEventListener('input', save);

// ── SIDEBAR / MOBILE ──
$btnMenu.addEventListener('click', function(){ $sb.classList.toggle('on'); $ov.classList.toggle('on'); });
$ov.addEventListener('click', closeSB);
function closeSB(){ $sb.classList.remove('on'); $ov.classList.remove('on'); }

// ── CONVERSATIONS ──
function newConv() {
  var id = 'c' + Date.now();
  convs.unshift({ id:id, title:'Новый чат', msgs:[] });
  curId = id;
  renderCL(); renderChat(); save();
}
function delConv(id) {
  convs = convs.filter(function(c){ return c.id !== id; });
  if (curId === id) curId = convs.length ? convs[0].id : null;
  if (!curId) newConv();
  else { renderCL(); renderChat(); save(); }
}
function swConv(id) { curId = id; renderCL(); renderChat(); closeSB(); save(); }
function cur() { return convs.find(function(c){ return c.id === curId; }); }

function renderCL() {
  $cl.innerHTML = '';
  convs.forEach(function(c) {
    var el = document.createElement('div');
    el.className = 'ci' + (c.id === curId ? ' on' : '');
    el.innerHTML = '<span class="ct">' + esc(c.title) + '</span><span class="cd" data-id="' + c.id + '">✕</span>';
    el.addEventListener('click', function(e) {
      if (e.target.classList.contains('cd')) {
        e.stopPropagation();
        delConv(e.target.getAttribute('data-id'));
      } else {
        swConv(c.id);
      }
    });
    $cl.appendChild(el);
  });
}

$btnNew.addEventListener('click', newConv);
$bc.addEventListener('click', function() {
  var c = cur(); if (!c) return;
  c.msgs = []; c.title = 'Новый чат';
  renderCL(); renderChat(); save();
});

// ── RENDER CHAT ──
function renderChat() {
  var c = cur();
  if (!c || !c.msgs.length) {
    $chat.innerHTML = '';
    $chat.appendChild($emp);
    return;
  }
  $chat.innerHTML = '';
  c.msgs.forEach(function(m){ addBubble(m.role, m.content); });
  scrollBot();
}

function addBubble(role, html, isLoading) {
  var wrap = document.createElement('div');
  wrap.className = 'msg ' + role;
  var lbl = document.createElement('div');
  lbl.className = 'mr';
  lbl.textContent = role === 'user' ? 'вы' : 'groq';
  var bub = document.createElement('div');
  bub.className = 'bub';
  if (isLoading) {
    bub.innerHTML = '<span class="thinking dots"><span>.</span><span>.</span><span>.</span></span>';
  } else {
    bub.innerHTML = fmt(html);
  }
  wrap.appendChild(lbl);
  wrap.appendChild(bub);
  $chat.appendChild(wrap);
  scrollBot();
  return bub;
}

function fmt(text) {
  // code blocks
  text = text.replace(/```(\w*)\n?([\s\S]*?)```/g, function(_, l, c){
    return '<pre><code>' + esc(c.trim()) + '</code></pre>';
  });
  // inline code
  text = text.replace(/`([^`\n]+)`/g, function(_, c){
    return '<code>' + esc(c) + '</code>';
  });
  // escape remaining text outside tags
  var parts = text.split(/(<pre>[\s\S]*?<\/pre>|<code>[^<]*<\/code>)/);
  return parts.map(function(p, i){ return i%2===0 ? esc(p) : p; }).join('');
}

function esc(s) {
  return String(s)
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;');
}

function scrollBot() {
  requestAnimationFrame(function(){ $chat.scrollTop = $chat.scrollHeight; });
}

// ── TOAST ──
var toastT;
function toast(msg, type) {
  clearTimeout(toastT);
  $toast.textContent = msg;
  $toast.className = 'on' + (type ? ' ' + type : '');
  toastT = setTimeout(function(){ $toast.className = ''; }, type === 'err' ? 8000 : 3000);
}

// ── SEND ──
$mi.addEventListener('keydown', function(e) {
  if (e.key==='Enter' && !e.shiftKey) {
    e.preventDefault();
    if (busy) stopReq(); else sendMsg();
  }
});
$bs.addEventListener('click', function(){ if (busy) stopReq(); else sendMsg(); });
$mi.addEventListener('input', function(){
  $mi.style.height = 'auto';
  $mi.style.height = Math.min($mi.scrollHeight, 150) + 'px';
});

function stopReq() {
  if (xhr) { xhr.abort(); xhr = null; }
}

function sendMsg() {
  var key = $ki.value.trim();
  if (!key) { toast('Введите API ключ Groq', 'err'); return; }
  var text = $mi.value.trim();
  if (!text) return;

  var c = cur();
  if (!c) { newConv(); c = cur(); }

  c.msgs.push({ role:'user', content:text });
  if (c.title === 'Новый чат') {
    c.title = text.slice(0, 44) + (text.length > 44 ? '…' : '');
  }
  $mi.value = ''; $mi.style.height = 'auto';
  renderCL(); renderChat(); save();

  // build messages array
  var messages = [];
  var sys = $sp.value.trim();
  if (sys) messages.push({ role:'system', content:sys });
  c.msgs.forEach(function(m){ messages.push({ role:m.role, content:m.content }); });

  // UI: loading state
  busy = true;
  $bs.textContent = '■'; $bs.classList.add('stop');
  var asstBub = addBubble('assistant', '', true);

  var payload = JSON.stringify({
    model: $ms.value,
    messages: messages,
    temperature: parseFloat($tmp.value),
    max_tokens: parseInt($tok.value),
    stream: false
  });

  xhr = new XMLHttpRequest();
  xhr.open('POST', 'https://api.groq.com/openai/v1/chat/completions', true);
  xhr.setRequestHeader('Content-Type', 'application/json');
  xhr.setRequestHeader('Authorization', 'Bearer ' + key);
  xhr.timeout = 60000;

  xhr.onload = function() {
    var data;
    try { data = JSON.parse(xhr.responseText); } catch(e) { data = {}; }
    if (xhr.status >= 200 && xhr.status < 300) {
      var reply = (data.choices && data.choices[0] && data.choices[0].message && data.choices[0].message.content) || '';
      asstBub.innerHTML = fmt(reply);
      if (reply.trim()) c.msgs.push({ role:'assistant', content:reply });
      else asstBub.closest('.msg').remove();
    } else {
      var errMsg = (data.error && data.error.message) || ('HTTP ' + xhr.status);
      asstBub.innerHTML = '<span style="color:var(--err)">❌ ' + esc(errMsg) + '</span>';
      toast('❌ ' + errMsg.slice(0, 100), 'err');
    }
    save(); scrollBot(); done();
  };

  xhr.onerror = function() {
    var msg = 'Браузер блокирует запрос из локального файла (CORS). Открой файл через сервер.';
    asstBub.innerHTML = '<span style="color:var(--err)">❌ ' + msg + '<br><br><b>Решение:</b> Установи Kiwi Browser на Android — он разрешает CORS из file://.<br>Или запусти: <code>python -m http.server 8080</code> и открой http://localhost:8080</span>';
    toast('❌ CORS/Сеть: открой через сервер', 'err');
    done();
  };

  xhr.ontimeout = function() {
    asstBub.innerHTML = '<span style="color:var(--err)">❌ Таймаут запроса (60с)</span>';
    toast('❌ Таймаут', 'err');
    done();
  };

  xhr.onabort = function() {
    asstBub.closest('.msg').remove();
    done();
  };

  xhr.send(payload);
}

function done() {
  busy = false; xhr = null;
  $bs.textContent = '▶'; $bs.classList.remove('stop');
}

// ── CONNECTION TEST ──
document.getElementById('btn-test').addEventListener('click', function() {
  var key = $ki.value.trim();
  if (!key) { toast('Сначала введи API ключ', 'err'); return; }
  toast('Проверка соединения…', '');
  var t = new XMLHttpRequest();
  t.open('GET', 'https://api.groq.com/openai/v1/models', true);
  t.setRequestHeader('Authorization', 'Bearer ' + key);
  t.timeout = 10000;
  t.onload = function() {
    if (t.status === 200) toast('✓ Соединение OK, ключ действителен', 'ok');
    else if (t.status === 401) toast('✓ Сеть OK, но ключ недействителен (401)', 'err');
    else toast('✓ Сеть OK, статус: ' + t.status, '');
  };
  t.onerror = function() { toast('❌ Запрос заблокирован браузером (CORS из file://)', 'err'); };
  t.ontimeout = function() { toast('❌ Таймаут — нет ответа от Groq', 'err'); };
  t.send();
});

// ── INIT ──
load();
updKey();
if (!convs.length) newConv();
else { renderCL(); renderChat(); }
</script>
